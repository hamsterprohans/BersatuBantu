server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Entry points: SELALU ambil versi terbaru dari server
    # index.html, flutter.js, bootstrap, manifest tidak boleh di-cache
    location ~* (index\.html|flutter\.js|flutter_bootstrap\.js|flutter_service_worker\.js|manifest\.json|version\.json|assetManifest\.bin|FontManifest\.json)$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Hashed Flutter assets: aman di-cache lama karena nama file berubah setiap build
    location ~* \.(js|css|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Gambar: cache 7 hari
    location ~* \.(png|jpg|jpeg|gif|ico|svg|webp)$ {
        expires 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # SPA fallback — index.html tidak di-cache
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/javascript application/xml+rss application/json font/woff font/woff2 image/svg+xml;
}
